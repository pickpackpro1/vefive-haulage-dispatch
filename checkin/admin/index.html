<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Check-In Admin — Vefive</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #fafaf9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #292524;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,.08);
  }
  h1 { font-size: 19px; font-weight: 700; margin: 0 0 4px; text-align: center; }
  .sub { font-size: 13px; color: #78716c; margin: 0 0 22px; text-align: center; }
  label { display: block; font-size: 12px; color: #78716c; margin-bottom: 6px; }
  input[type="text"], input[type="password"] {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border: 1px solid #d6d3d1;
    border-radius: 10px;
    font-size: 16px;
    margin-bottom: 14px;
  }
  input[type="password"] { text-align: center; letter-spacing: 1px; }
  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: #b45309; color: #fff; }
  .btn-primary:disabled { background: #d6d3d1; color: #a8a29e; cursor: not-allowed; }
  .error { color: #b91c1c; font-size: 13px; margin: 0 0 12px; min-height: 16px; }
  .success { color: #047857; font-size: 13px; margin-top: 10px; text-align: center; }
  .hint { font-size: 12px; color: #a8a29e; margin: -8px 0 14px; }
  .spinner {
    width: 26px; height: 26px; margin: 0 auto 14px;
    border: 3px solid #e7e5e4; border-top-color: #b45309; border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app" class="card">
  <div class="spinner"></div>
  <p class="sub">Loading…</p>
</div>

<script>
(function () {
  var SUPABASE_URL = 'https://rkeqyydekyiahlnyovvs.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_VwrybW--aZbDv1Ea7OoKLg_Mw5KwmvA';
  // Same shared passcode as the main dashboard — this is just a light gate,
  // not real per-admin auth, consistent with the rest of this app.
  var ADMIN_PASSCODE = 'soungiyoun';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  var app = document.getElementById('app');

  function getJson(key, fallback) {
    return sb.from('app_data').select('value').eq('key', key).maybeSingle().then(function (res) {
      if (res.error) throw res.error;
      return res.data ? JSON.parse(res.data.value) : fallback;
    });
  }
  function setJson(key, value) {
    return sb.from('app_data').upsert({ key: key, value: JSON.stringify(value), updated_at: new Date().toISOString() }).then(function (res) {
      if (res.error) throw res.error;
    });
  }
  function render(html) { app.innerHTML = html; }
  function showLoading(msg) { render('<div class="spinner"></div><p class="sub">' + (msg || 'Loading…') + '</p>'); }
  function showFatal(msg) {
    render('<h1>Something went wrong</h1><p class="error" style="margin-top:8px">' + msg + '</p><button class="btn-primary" onclick="location.reload()">Try again</button>');
  }

  function showPasscodeScreen() {
    render(
      '<h1>Check-In Admin</h1>' +
      '<p class="sub">Enter the admin passcode</p>' +
      '<input type="password" id="pc-input" placeholder="Passcode" autofocus />' +
      '<div class="error" id="pc-error"></div>' +
      '<button class="btn-primary" id="pc-submit">Continue</button>'
    );
    var input = document.getElementById('pc-input');
    var errEl = document.getElementById('pc-error');
    var submit = function () {
      if (input.value === ADMIN_PASSCODE) { showSettingsScreen(); }
      else { errEl.textContent = 'Incorrect passcode.'; }
    };
    document.getElementById('pc-submit').addEventListener('click', submit);
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
  }

  function showSettingsScreen() {
    showLoading('Loading current setting…');
    Promise.all([getJson('checkinSettings', {}), getJson('settings', {})]).then(function (results) {
      var checkinSettings = results[0];
      var mainSettings = results[1];
      var current = checkinSettings.warehousePostcode || mainSettings.yardPostcode || '';
      var radius = checkinSettings.geofenceRadiusM || 100;
      var lat = checkinSettings.warehouseLat != null ? checkinSettings.warehouseLat : '';
      var lng = checkinSettings.warehouseLng != null ? checkinSettings.warehouseLng : '';
      render(
        '<h1>Check-In Settings</h1>' +
        '<p class="sub">Where drivers must be, and how close, to check in/out</p>' +
        '<label>Geofence radius (metres)</label>' +
        '<input type="text" inputmode="numeric" id="radius-field" value="' + escapeHtml(String(radius)) + '" placeholder="100" />' +
        '<label>Warehouse postcode</label>' +
        '<input type="text" id="pc-field" value="' + escapeHtml(current) + '" placeholder="e.g. MK1 1AA" />' +
        '<div class="hint">Used to look up the warehouse location — UK postcodes only.</div>' +
        '<label>Test coordinates override</label>' +
        '<div style="display:flex; gap:8px; margin-bottom:6px;">' +
          '<input type="text" inputmode="decimal" id="lat-field" value="' + escapeHtml(String(lat)) + '" placeholder="Latitude" style="margin-bottom:0" />' +
          '<input type="text" inputmode="decimal" id="lng-field" value="' + escapeHtml(String(lng)) + '" placeholder="Longitude" style="margin-bottom:0" />' +
        '</div>' +
        '<div class="hint">If set, this overrides the postcode entirely — use this to test from anywhere (e.g. outside the UK). Clear both fields and save to go back to using the postcode.</div>' +
        '<div class="error" id="save-error"></div>' +
        '<button class="btn-primary" id="save-btn">Save</button>' +
        '<div id="save-success"></div>'
      );
      document.getElementById('save-btn').addEventListener('click', function () {
        var val = document.getElementById('pc-field').value.trim();
        var radiusVal = document.getElementById('radius-field').value.trim();
        var latVal = document.getElementById('lat-field').value.trim();
        var lngVal = document.getElementById('lng-field').value.trim();
        var errEl = document.getElementById('save-error');
        var okEl = document.getElementById('save-success');
        errEl.textContent = '';
        okEl.textContent = '';
        if (!val) { errEl.textContent = 'Enter a postcode (still required as the fallback).'; return; }
        var radiusNum = Number(radiusVal);
        if (!radiusVal || !Number.isFinite(radiusNum) || radiusNum <= 0) { errEl.textContent = 'Radius must be a positive number.'; return; }
        if ((latVal && !lngVal) || (!latVal && lngVal)) { errEl.textContent = 'Set both latitude and longitude, or leave both blank.'; return; }
        var payload = { warehousePostcode: val, geofenceRadiusM: radiusNum };
        if (latVal && lngVal) {
          var latNum = Number(latVal), lngNum = Number(lngVal);
          if (!Number.isFinite(latNum) || !Number.isFinite(lngNum)) { errEl.textContent = 'Latitude/longitude must be numbers.'; return; }
          payload.warehouseLat = latNum;
          payload.warehouseLng = lngNum;
        } else {
          payload.warehouseLat = null;
          payload.warehouseLng = null;
        }
        var btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        setJson('checkinSettings', payload).then(function () {
          btn.disabled = false;
          btn.textContent = 'Save';
          okEl.innerHTML = '<p class="success">Saved.</p>';
        }).catch(function (e) {
          btn.disabled = false;
          btn.textContent = 'Save';
          errEl.textContent = 'Could not save: ' + (e.message || e);
        });
      });
    }).catch(function (e) { showFatal(e.message || String(e)); });
  }

  function escapeHtml(s) {
    var div = document.createElement('div');
    div.textContent = s || '';
    return div.innerHTML;
  }

  showPasscodeScreen();
})();
</script>
</body>
</html>
